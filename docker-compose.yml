version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_agent
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: agentdb
      MYSQL_USER: agentuser
      MYSQL_PASSWORD: agentpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: spring_agent
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/agentdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: agentuser
      SPRING_DATASOURCE_PASSWORD: agentpass
    depends_on:
      - db

volumes:
  db_data: