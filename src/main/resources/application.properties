spring.application.name=sen-scu

# --- Database (Railway injects these automatically) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sen-csu1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Stockage photo ---
app.storage.path=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- JWT ---
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=3600000
jwt.refresh-token.expiration=604800000

# --- Server port (Railway sets PORT automatically) ---
server.port=${PORT:8080}

# --- Logs ---
logging.level.org.springframework.security=WARN
logging.level.com.example.sencsu=INFO





